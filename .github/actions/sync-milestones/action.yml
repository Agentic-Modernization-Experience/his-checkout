name: 'Sync Repository Milestones'
description: 'Synchronize repository milestones from a templates-mapping.json file'

inputs:
  milestones-file:
    description: 'Path to the milestones JSON file'
    required: true
    default: '.github/templates/default/templates-mapping.json'
  repository:
    description: 'Repository to sync milestones (format: owner/repo)'
    required: true

outputs:
  milestone_map:
    description: 'JSON map of milestone title to milestone number'
    value: ${{ steps.sync.outputs.milestone_map }}

runs:
  using: 'composite'
  steps:
  - name: Validate inputs
    shell: bash
    run: |
      if [[ ! "${{ inputs.repository }}" =~ ^[^/]+/[^/]+$ ]]; then
        echo "::error::Invalid repository format. Expected: owner/repo"
        exit 1
      fi

      if [[ ! -f "${{ inputs.milestones-file }}" ]]; then
        echo "::error::Milestones file not found: ${{ inputs.milestones-file }}"
        exit 1
      fi

  - name: Sync milestones
    id: sync
    uses: actions/github-script@v7
    env:
      MILESTONES_FILE: ${{ inputs.milestones-file }}
      REPOSITORY: ${{ inputs.repository }}
    with:
      github-token: ${{ env.GH_TOKEN }}
      result-encoding: string
      script: |
        const fs = require('fs');

        const milestonesFile = (process.env.MILESTONES_FILE || '').trim();
        const repository = (process.env.REPOSITORY || '').trim();

        try {
          if (!milestonesFile || !fs.existsSync(milestonesFile)) {
            throw new Error(`Milestones file not found: ${milestonesFile}`);
          }

          if (!repository.includes('/')) {
            throw new Error('Invalid repository format. Expected owner/repo.');
          }

          const [owner, repo] = repository.split('/');
          const mapping = JSON.parse(fs.readFileSync(milestonesFile, 'utf8'));
          const configuredMilestones = Array.isArray(mapping.milestones) ? mapping.milestones : [];

          if (configuredMilestones.length === 0) {
            core.info('No milestones configured in mapping file. Skipping milestone sync.');
            const emptyMap = '{}';
            core.setOutput('milestone_map', emptyMap);
            return emptyMap;
          }

          const existingMilestones = await github.paginate(github.rest.issues.listMilestones, {
            owner,
            repo,
            state: 'all',
            per_page: 100
          });

          const existingByTitle = new Map(existingMilestones.map((milestone) => [milestone.title, milestone]));
          const milestoneMap = {};

          for (const milestone of configuredMilestones) {
            const title = String(milestone.title || '').trim();
            const description = milestone.description == null ? '' : String(milestone.description);
            const state = milestone.state === 'closed' ? 'closed' : 'open';

            if (!title) {
              core.warning('Found configured milestone with empty title. Skipping entry.');
              continue;
            }

            const existing = existingByTitle.get(title);

            if (!existing) {
              core.info(`Creating milestone: ${title}`);
              const { data: created } = await github.rest.issues.createMilestone({
                owner,
                repo,
                title,
                description,
                state
              });

              existingByTitle.set(title, created);
              milestoneMap[title] = created.number;
              continue;
            }

            const needsDescriptionUpdate = (existing.description || '') !== description;
            const needsStateUpdate = existing.state !== state;

            if (needsDescriptionUpdate || needsStateUpdate) {
              core.info(`Updating milestone: ${title}`);
              const { data: updated } = await github.rest.issues.updateMilestone({
                owner,
                repo,
                milestone_number: existing.number,
                title,
                description,
                state
              });

              existingByTitle.set(title, updated);
              milestoneMap[title] = updated.number;
            } else {
              core.info(`Milestone unchanged: ${title}`);
              milestoneMap[title] = existing.number;
            }
          }

          const milestoneMapJson = JSON.stringify(milestoneMap);
          core.setOutput('milestone_map', milestoneMapJson);
          return milestoneMapJson;
        } catch (error) {
          core.setFailed(error.message);
          throw error;
        }
