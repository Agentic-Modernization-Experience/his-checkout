# Import tasks from Jira or Kanbanize into GitHub Issues.
# The PO runs this workflow manually — it connects to the external board API,
# fetches tasks, skips already-imported ones (idempotent), and creates GitHub Issues.
# The HIS framework then processes each issue automatically (assign Copilot → WIP → Review → Done).
#
# Prerequisites (one-time setup by admin):
#   For Jira:      Settings → Secrets → JIRA_EMAIL, JIRA_API_TOKEN
#   For Kanbanize: Settings → Secrets → KANBANIZE_API_KEY
#   GITHUB_TOKEN is available by default — no setup needed.

name: 'Import from External Board'

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'External board provider'
        required: false
        type: choice
        default: 'jira'
        options:
          - jira
          - kanbanize
      # --- Jira inputs ---
      jira_base_url:
        description: 'Jira Cloud base URL (e.g. https://acme.atlassian.net)'
        required: false
        default: ''
      jira_project_key:
        description: 'Jira project key (e.g. PROJ)'
        required: false
        default: ''
      jira_jql_filter:
        description: 'JQL filter to select tasks (e.g. status="To Do" AND type=Story). Leave empty to use project_key with default filter.'
        required: false
        default: ''
      jira_max_results:
        description: 'Maximum number of Jira tasks to import per run'
        required: false
        default: '50'
      # --- Kanbanize inputs ---
      kanbanize_subdomain:
        description: 'Kanbanize subdomain (e.g. acme for acme.kanbanize.com)'
        required: false
        default: ''
      kanbanize_board_id:
        description: 'Kanbanize board ID'
        required: false
        default: ''
      kanbanize_column_filter:
        description: 'Comma-separated column IDs to import from (leave empty for all "Requested" cards)'
        required: false
        default: ''
      kanbanize_max_results:
        description: 'Maximum number of Kanbanize cards to import per run'
        required: false
        default: '50'

permissions:
  issues: write
  contents: read

jobs:
  import-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/squad-config.json
            .github/actions/load-squad-config
            .github/actions/import-external-task
            .github/actions/add-to-project

      - name: Load squad config
        id: config
        uses: ./.github/actions/load-squad-config

      - name: Validate inputs
        run: |
          SOURCE="${{ inputs.source }}"
          if [[ "$SOURCE" == "jira" ]]; then
            if [[ -z "${{ inputs.jira_base_url }}" ]]; then
              echo "::error::jira_base_url is required when source is jira"
              exit 1
            fi
            if [[ -z "${{ inputs.jira_project_key }}" && -z "${{ inputs.jira_jql_filter }}" ]]; then
              echo "::error::Either jira_project_key or jira_jql_filter must be provided"
              exit 1
            fi
          elif [[ "$SOURCE" == "kanbanize" ]]; then
            if [[ -z "${{ inputs.kanbanize_subdomain }}" ]]; then
              echo "::error::kanbanize_subdomain is required when source is kanbanize"
              exit 1
            fi
            if [[ -z "${{ inputs.kanbanize_board_id }}" ]]; then
              echo "::error::kanbanize_board_id is required when source is kanbanize"
              exit 1
            fi
          fi

      - name: Fetch tasks from external board
        id: fetch-tasks
        uses: actions/github-script@v7
        env:
          SOURCE: ${{ inputs.source }}
          JIRA_BASE_URL: ${{ inputs.jira_base_url }}
          JIRA_PROJECT_KEY: ${{ inputs.jira_project_key }}
          JIRA_JQL_FILTER: ${{ inputs.jira_jql_filter }}
          JIRA_MAX_RESULTS: ${{ inputs.jira_max_results }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          KANBANIZE_SUBDOMAIN: ${{ inputs.kanbanize_subdomain }}
          KANBANIZE_BOARD_ID: ${{ inputs.kanbanize_board_id }}
          KANBANIZE_COLUMN_FILTER: ${{ inputs.kanbanize_column_filter }}
          KANBANIZE_MAX_RESULTS: ${{ inputs.kanbanize_max_results }}
          KANBANIZE_API_KEY: ${{ secrets.KANBANIZE_API_KEY }}
          TRIGGER_LABEL: ${{ steps.config.outputs.trigger_label }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const source = process.env.SOURCE;
            const triggerLabel = process.env.TRIGGER_LABEL;
            const { owner, repo } = context.repo;

            let tasks = [];

            if (source === 'jira') {
              tasks = await fetchJiraTasks();
            } else if (source === 'kanbanize') {
              tasks = await fetchKanbanizeTasks();
            }

            core.info(`\nFetched ${tasks.length} tasks from ${source}`);
            core.setOutput('total_fetched', tasks.length);

            // --- Import each task ---
            const results = { created: [], skipped: [], failed: [] };

            // Load existing issues to check idempotency in bulk
            const existingBodies = new Map();
            let page = 1;
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner, repo,
                labels: triggerLabel,
                state: 'all',
                per_page: 100,
                page
              });
              if (issues.length === 0) break;
              for (const issue of issues) {
                if (issue.body) {
                  const match = issue.body.match(/<!-- source: (\w+):(.+?) -->/);
                  if (match) {
                    existingBodies.set(`${match[1]}:${match[2]}`, issue);
                  }
                }
              }
              if (issues.length < 100) break;
              page++;
            }

            core.info(`Found ${existingBodies.size} previously imported tasks\n`);

            for (const task of tasks) {
              const sourceKey = `${source}:${task.id}`;

              // Idempotency: skip if already imported
              if (existingBodies.has(sourceKey)) {
                const existing = existingBodies.get(sourceKey);
                core.info(`SKIP: ${task.id} — already imported as #${existing.number}`);
                results.skipped.push({
                  source_id: task.id,
                  existing_issue: existing.number,
                  title: task.title
                });
                continue;
              }

              try {
                // Build issue body
                const sourceMarker = `<!-- source: ${source}:${task.id} -->`;
                let body = `${sourceMarker}\n\n`;
                body += `> **Imported from ${source.charAt(0).toUpperCase() + source.slice(1)}**: \`${task.id}\``;
                if (task.url) body += ` — [View original](${task.url})`;
                body += '\n';
                if (task.priority) body += `> **Priority**: ${task.priority}\n`;
                body += '\n---\n\n';
                body += task.description || '*No description provided in the source task.*';

                const labels = [triggerLabel];

                const { data: issue } = await github.rest.issues.create({
                  owner, repo,
                  title: task.title,
                  body,
                  labels
                });

                core.info(`CREATE: ${task.id} → #${issue.number}`);
                results.created.push({
                  source_id: task.id,
                  issue_number: issue.number,
                  issue_url: issue.html_url,
                  issue_node_id: issue.node_id,
                  title: task.title
                });

                // Rate limit: pause between creations
                await sleep(source === 'kanbanize' ? 2000 : 500);

              } catch (error) {
                core.warning(`FAIL: ${task.id} — ${error.message}`);
                results.failed.push({
                  source_id: task.id,
                  title: task.title,
                  error: error.message
                });
              }
            }

            core.setOutput('created_count', results.created.length);
            core.setOutput('skipped_count', results.skipped.length);
            core.setOutput('failed_count', results.failed.length);
            core.setOutput('created_issues', JSON.stringify(results.created));

            core.info(`\n=== Import Summary ===`);
            core.info(`Created: ${results.created.length}`);
            core.info(`Skipped (already imported): ${results.skipped.length}`);
            core.info(`Failed: ${results.failed.length}`);

            return JSON.stringify(results, null, 2);

            // ========== Helper Functions ==========

            async function fetchJiraTasks() {
              const baseUrl = process.env.JIRA_BASE_URL.replace(/\/$/, '');
              const email = process.env.JIRA_EMAIL;
              const token = process.env.JIRA_API_TOKEN;
              const projectKey = process.env.JIRA_PROJECT_KEY;
              const jqlFilter = process.env.JIRA_JQL_FILTER;
              const maxResults = parseInt(process.env.JIRA_MAX_RESULTS || '50', 10);

              if (!email || !token) {
                throw new Error('JIRA_EMAIL and JIRA_API_TOKEN secrets are required for Jira import');
              }

              const jql = jqlFilter || `project = "${projectKey}" AND statusCategory != "Done" ORDER BY created DESC`;
              const auth = Buffer.from(`${email}:${token}`).toString('base64');

              core.info(`Fetching Jira tasks: ${jql}`);

              const url = `${baseUrl}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=${maxResults}&fields=summary,description,priority,status,issuetype`;

              const response = await fetch(url, {
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Accept': 'application/json'
                }
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Jira API error ${response.status}: ${errorText}`);
              }

              const data = await response.json();
              core.info(`Jira returned ${data.issues.length} issues (total: ${data.total})`);

              return data.issues.map(issue => ({
                id: issue.key,
                title: issue.fields.summary,
                description: convertAdfToMarkdown(issue.fields.description),
                priority: issue.fields.priority?.name || '',
                url: `${baseUrl}/browse/${issue.key}`
              }));
            }

            async function fetchKanbanizeTasks() {
              const subdomain = process.env.KANBANIZE_SUBDOMAIN;
              const boardId = process.env.KANBANIZE_BOARD_ID;
              const columnFilter = process.env.KANBANIZE_COLUMN_FILTER;
              const maxResults = parseInt(process.env.KANBANIZE_MAX_RESULTS || '50', 10);
              const apiKey = process.env.KANBANIZE_API_KEY;

              if (!apiKey) {
                throw new Error('KANBANIZE_API_KEY secret is required for Kanbanize import');
              }

              const baseUrl = `https://${subdomain}.kanbanize.com/api/v2`;

              let url = `${baseUrl}/cards?board_ids=${boardId}&per_page=${maxResults}&is_archived=0`;
              if (columnFilter) {
                url += `&column_ids=${columnFilter}`;
              }

              core.info(`Fetching Kanbanize cards from board ${boardId}...`);

              // Respect Kanbanize rate limit (30 req/min)
              const response = await fetch(url, {
                headers: {
                  'apikey': apiKey,
                  'Accept': 'application/json'
                }
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Kanbanize API error ${response.status}: ${errorText}`);
              }

              const data = await response.json();
              const cards = data.data || [];
              core.info(`Kanbanize returned ${cards.length} cards`);

              return cards.map(card => ({
                id: String(card.card_id),
                title: card.title || card.name || `Card ${card.card_id}`,
                description: convertHtmlToMarkdown(card.description || ''),
                priority: card.priority ? `P${card.priority}` : '',
                url: `https://${subdomain}.kanbanize.com/ctrl_board/${boardId}/cards/${card.card_id}`
              }));
            }

            // Lightweight ADF → Markdown converter
            // Handles the most common ADF node types from Jira Cloud
            function convertAdfToMarkdown(adf) {
              if (!adf) return '';
              if (typeof adf === 'string') return adf;

              try {
                return processAdfNodes(adf.content || []);
              } catch (e) {
                core.warning(`ADF conversion failed, using fallback: ${e.message}`);
                return JSON.stringify(adf, null, 2);
              }
            }

            function processAdfNodes(nodes) {
              if (!Array.isArray(nodes)) return '';
              return nodes.map(node => processAdfNode(node)).join('');
            }

            function processAdfNode(node) {
              if (!node) return '';

              switch (node.type) {
                case 'doc':
                  return processAdfNodes(node.content || []);
                case 'paragraph':
                  return processAdfNodes(node.content || []) + '\n\n';
                case 'text': {
                  let text = node.text || '';
                  if (node.marks) {
                    for (const mark of node.marks) {
                      if (mark.type === 'strong') text = `**${text}**`;
                      else if (mark.type === 'em') text = `*${text}*`;
                      else if (mark.type === 'code') text = `\`${text}\``;
                      else if (mark.type === 'link') text = `[${text}](${mark.attrs?.href || ''})`;
                    }
                  }
                  return text;
                }
                case 'heading': {
                  const level = node.attrs?.level || 1;
                  const hashes = '#'.repeat(level);
                  return `${hashes} ${processAdfNodes(node.content || [])}\n\n`;
                }
                case 'bulletList':
                  return (node.content || []).map(item =>
                    `- ${processAdfNodes(item.content || []).trim()}`
                  ).join('\n') + '\n\n';
                case 'orderedList':
                  return (node.content || []).map((item, i) =>
                    `${i + 1}. ${processAdfNodes(item.content || []).trim()}`
                  ).join('\n') + '\n\n';
                case 'listItem':
                  return processAdfNodes(node.content || []);
                case 'codeBlock': {
                  const lang = node.attrs?.language || '';
                  const code = processAdfNodes(node.content || []).trim();
                  return `\`\`\`${lang}\n${code}\n\`\`\`\n\n`;
                }
                case 'blockquote':
                  return processAdfNodes(node.content || []).split('\n')
                    .map(line => `> ${line}`).join('\n') + '\n\n';
                case 'rule':
                  return '---\n\n';
                case 'hardBreak':
                  return '\n';
                case 'table':
                case 'tableRow':
                case 'tableHeader':
                case 'tableCell':
                  // Simplified table handling: extract text content
                  return processAdfNodes(node.content || []);
                default:
                  return processAdfNodes(node.content || []);
              }
            }

            // Lightweight HTML → Markdown converter for Kanbanize descriptions
            function convertHtmlToMarkdown(html) {
              if (!html) return '';
              if (!html.includes('<')) return html;

              let md = html;
              // Block elements
              md = md.replace(/<h([1-6])[^>]*>(.*?)<\/h[1-6]>/gi, (_, level, content) =>
                '#'.repeat(parseInt(level)) + ' ' + content.replace(/<[^>]+>/g, '') + '\n\n');
              md = md.replace(/<p[^>]*>(.*?)<\/p>/gi, '$1\n\n');
              md = md.replace(/<br\s*\/?>/gi, '\n');
              md = md.replace(/<hr\s*\/?>/gi, '---\n\n');
              // Inline elements
              md = md.replace(/<strong[^>]*>(.*?)<\/strong>/gi, '**$1**');
              md = md.replace(/<b[^>]*>(.*?)<\/b>/gi, '**$1**');
              md = md.replace(/<em[^>]*>(.*?)<\/em>/gi, '*$1*');
              md = md.replace(/<i[^>]*>(.*?)<\/i>/gi, '*$1*');
              md = md.replace(/<code[^>]*>(.*?)<\/code>/gi, '`$1`');
              md = md.replace(/<a[^>]+href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)');
              // Lists
              md = md.replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n');
              md = md.replace(/<\/?[ou]l[^>]*>/gi, '\n');
              // Code blocks
              md = md.replace(/<pre[^>]*><code[^>]*>([\s\S]*?)<\/code><\/pre>/gi, '```\n$1\n```\n\n');
              // Blockquotes
              md = md.replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1\n\n');
              // Strip remaining tags
              md = md.replace(/<[^>]+>/g, '');
              // Decode common HTML entities
              md = md.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
              md = md.replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ');
              // Clean up whitespace
              md = md.replace(/\n{3,}/g, '\n\n').trim();

              return md;
            }

            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

      - name: Add created issues to project
        if: steps.fetch-tasks.outputs.created_count != '0' && steps.config.outputs.org_login != '' && steps.config.outputs.project_number != ''
        uses: actions/github-script@v7
        env:
          CREATED_ISSUES: ${{ steps.fetch-tasks.outputs.created_issues }}
          ORG_LOGIN: ${{ steps.config.outputs.org_login }}
          PROJECT_NUMBER: ${{ steps.config.outputs.project_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = JSON.parse(process.env.CREATED_ISSUES || '[]');
            const orgLogin = process.env.ORG_LOGIN;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER, 10);

            if (issues.length === 0) {
              core.info('No issues to add to project');
              return;
            }

            // Fetch project ID
            const projectResult = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) { id }
                }
              }
            `, { org: orgLogin, number: projectNumber });

            const projectId = projectResult.organization.projectV2?.id;
            if (!projectId) {
              core.warning(`Project ${orgLogin}/${projectNumber} not found`);
              return;
            }

            for (const issue of issues) {
              try {
                await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                      item { id }
                    }
                  }
                `, { projectId, contentId: issue.issue_node_id });

                core.info(`Added #${issue.issue_number} to project`);
              } catch (e) {
                core.warning(`Failed to add #${issue.issue_number} to project: ${e.message}`);
              }
              await new Promise(r => setTimeout(r, 300));
            }

      - name: Summary
        if: always()
        run: |
          echo "## Import from External Board" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: ${{ inputs.source }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tasks fetched**: ${{ steps.fetch-tasks.outputs.total_fetched || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues created**: ${{ steps.fetch-tasks.outputs.created_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped (already imported)**: ${{ steps.fetch-tasks.outputs.skipped_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed**: ${{ steps.fetch-tasks.outputs.failed_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How it works" >> $GITHUB_STEP_SUMMARY
          echo "Imported tasks become regular GitHub Issues with the trigger label." >> $GITHUB_STEP_SUMMARY
          echo "The HIS framework will automatically assign Copilot and process each task independently." >> $GITHUB_STEP_SUMMARY
          echo "When done, run **Export Completion Report** to generate a checklist for updating the original board." >> $GITHUB_STEP_SUMMARY
