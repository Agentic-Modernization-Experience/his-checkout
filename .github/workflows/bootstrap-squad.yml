name: Bootstrap Agent Squad

on:
  workflow_dispatch:
    inputs:
      org_login:
        description: 'GitHub Organization login (override squad-config.json)'
        required: false
        default: ''
      project_number:
        description: 'GitHub Project V2 number (override squad-config.json)'
        required: false
        default: ''
      project_url:
        description: 'GitHub Project URL (override squad-config.json)'
        required: false
        default: ''
      kb_type:
        description: 'Knowledge base type (override squad-config.json)'
        required: false
        default: ''
      kb_name:
        description: 'Knowledge base name (override squad-config.json)'
        required: false
        default: ''
      kb_url:
        description: 'Knowledge base URL or local path (override squad-config.json)'
        required: false
        default: ''
      sync_labels:
        description: 'Sync labels? true/false (override squad-config.json)'
        required: false
        default: ''
      sync_milestones:
        description: 'Sync milestones? true/false (override squad-config.json)'
        required: false
        default: ''
      copilot_pr_author:
        description: 'Login shown on Copilot PRs (override squad-config.json)'
        required: false
        default: ''
      project_status_field:
        description: 'Status field name in Project V2 (override squad-config.json)'
        required: false
        default: ''
      template_profile:
        description: 'Template profile name (override squad-config.json)'
        required: false
        default: ''
      trigger_label:
        description: 'Trigger label (override squad-config.json)'
        required: false
        default: ''
      create_first_issue:
        description: 'Create first phase issue? true/false (override squad-config.json)'
        required: false
        default: ''
      status_todo:
        description: 'Project status: backlog (override squad-config.json)'
        required: false
        default: ''
      status_wip:
        description: 'Project status: in progress (override squad-config.json)'
        required: false
        default: ''
      status_review:
        description: 'Project status: in review (override squad-config.json)'
        required: false
        default: ''
      status_done:
        description: 'Project status: done (override squad-config.json)'
        required: false
        default: ''

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.HIS_TOKEN }}
    timeout-minutes: 10
    steps:
      - name: Validate authentication token
        env:
          GH_TOKEN: ${{ secrets.HIS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::HIS_TOKEN secret is not configured. Please add a Personal Access Token with the required scopes to your repository secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check existing files
        id: check_files
        run: |
          if [[ -f ".github/squad-config.json" ]]; then
            echo "config_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "config_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f ".github/copilot-instructions.md" ]]; then
            echo "instructions_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "instructions_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate squad-config.json
        if: steps.check_files.outputs.config_exists != 'true'
        run: |
          # Config doesn't exist here due to step-level if — inputs are required
          MISSING=()
          [[ -z "${{ inputs.org_login }}" ]] && MISSING+=("org_login")
          [[ -z "${{ inputs.project_number }}" ]] && MISSING+=("project_number")
          [[ -z "${{ inputs.project_url }}" ]] && MISSING+=("project_url")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::squad-config.json not found and required inputs are missing: ${MISSING[*]}"
            echo "::error::Either commit a squad-config.json or provide all required inputs."
            exit 1
          fi

          cat > .github/squad-config.json << 'ENDOFCONFIG'
          {
            "org_login": "${{ inputs.org_login }}",
            "project_number": ${{ inputs.project_number }},
            "project_url": "${{ inputs.project_url }}",
            "knowledge_base": {
              "type": "${{ inputs.kb_type }}",
              "name": "${{ inputs.kb_name }}",
              "url": "${{ inputs.kb_url }}",
              "local_path": ".github/knowledge-base"
            },
            "labels": {
              "wip": "AI-AGENT_WIP",
              "review": "AI-AGENT_REVIEW",
              "trigger": "${{ inputs.trigger_label }}"
            },
            "copilot_bot_login": "copilot-swe-agent",
            "copilot_pr_author": "${{ inputs.copilot_pr_author }}",
            "project_status_field": "${{ inputs.project_status_field }}",
            "project_status_values": {
              "todo": "${{ inputs.status_todo }}",
              "wip": "${{ inputs.status_wip }}",
              "review": "${{ inputs.status_review }}",
              "done": "${{ inputs.status_done }}"
            },
            "human_reviewers": [],
            "wip_timeout_hours": 24,
            "template_profile": "${{ inputs.template_profile }}",
            "template_vars": {},
            "workspaces": {
              "source": {
                "label": "",
                "paths": {}
              },
              "target": {
                "label": "",
                "paths": {}
              }
            }
          }
          ENDOFCONFIG
          echo "Squad config generated:"
          cat .github/squad-config.json

      - name: Scaffold copilot-instructions.md
        if: steps.check_files.outputs.instructions_exists != 'true'
        run: |
          if [[ -f ".github/templates/copilot-instructions.template.md" ]]; then
            cp .github/templates/copilot-instructions.template.md .github/copilot-instructions.md
            echo "copilot-instructions.md scaffolded from template"
          fi

      - name: Commit bootstrap files
        if: steps.check_files.outputs.config_exists != 'true' || steps.check_files.outputs.instructions_exists != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bootstrap squad-config.json and copilot-instructions.md [skip ci]"
          file_pattern: .github/squad-config.json .github/copilot-instructions.md

      - name: Validate config
        id: config
        uses: ./.github/actions/load-squad-config

      - name: Resolve effective values
        id: resolve
        run: |
          # Rule: input if non-empty, else config output from load-squad-config, else hardcoded default
          resolve() {
            local input_val="$1" config_val="$2" default_val="$3"
            if [[ -n "$input_val" ]]; then echo "$input_val"
            elif [[ -n "$config_val" ]]; then echo "$config_val"
            else echo "$default_val"
            fi
          }

          ORG_LOGIN=$(resolve "${{ inputs.org_login }}" "${{ steps.config.outputs.org_login }}" "")
          PROJECT_NUMBER=$(resolve "${{ inputs.project_number }}" "${{ steps.config.outputs.project_number }}" "")
          PROJECT_URL=$(resolve "${{ inputs.project_url }}" "${{ steps.config.outputs.project_url }}" "")
          KB_TYPE=$(resolve "${{ inputs.kb_type }}" "${{ steps.config.outputs.kb_type }}" "local")
          KB_NAME=$(resolve "${{ inputs.kb_name }}" "${{ steps.config.outputs.kb_name }}" "")
          KB_URL=$(resolve "${{ inputs.kb_url }}" "${{ steps.config.outputs.kb_url }}" ".github/knowledge-base")
          SYNC_LABELS=$(resolve "${{ inputs.sync_labels }}" "${{ steps.config.outputs.sync_labels }}" "true")
          SYNC_MILESTONES=$(resolve "${{ inputs.sync_milestones }}" "${{ steps.config.outputs.sync_milestones }}" "true")
          COPILOT_PR_AUTHOR=$(resolve "${{ inputs.copilot_pr_author }}" "${{ steps.config.outputs.copilot_pr_author }}" "Copilot")
          PROJECT_STATUS_FIELD=$(resolve "${{ inputs.project_status_field }}" "${{ steps.config.outputs.project_status_field }}" "Status")
          TEMPLATE_PROFILE=$(resolve "${{ inputs.template_profile }}" "${{ steps.config.outputs.template_profile }}" "default")
          TRIGGER_LABEL=$(resolve "${{ inputs.trigger_label }}" "${{ steps.config.outputs.trigger_label }}" "squad")
          CREATE_FIRST_ISSUE=$(resolve "${{ inputs.create_first_issue }}" "${{ steps.config.outputs.create_first_issue }}" "true")
          STATUS_TODO=$(resolve "${{ inputs.status_todo }}" "${{ steps.config.outputs.status_todo }}" "Todo")
          STATUS_WIP=$(resolve "${{ inputs.status_wip }}" "${{ steps.config.outputs.status_wip }}" "In Progress")
          STATUS_REVIEW=$(resolve "${{ inputs.status_review }}" "${{ steps.config.outputs.status_review }}" "Review")
          STATUS_DONE=$(resolve "${{ inputs.status_done }}" "${{ steps.config.outputs.status_done }}" "Done")

          # Config-only values (no corresponding input)
          WIP_LABEL="${{ steps.config.outputs.wip_label }}"
          REVIEW_LABEL="${{ steps.config.outputs.review_label }}"
          COPILOT_BOT_LOGIN="${{ steps.config.outputs.copilot_bot_login }}"
          HUMAN_REVIEWERS='${{ steps.config.outputs.human_reviewers }}'
          WIP_TIMEOUT_HOURS="${{ steps.config.outputs.wip_timeout_hours }}"
          TEMPLATE_VARS='${{ steps.config.outputs.template_vars }}'
          WORKSPACES='${{ steps.config.outputs.workspaces }}'

          # Emit all outputs
          {
            echo "org_login=$ORG_LOGIN"
            echo "project_number=$PROJECT_NUMBER"
            echo "project_url=$PROJECT_URL"
            echo "kb_type=$KB_TYPE"
            echo "kb_name=$KB_NAME"
            echo "kb_url=$KB_URL"
            echo "sync_labels=$SYNC_LABELS"
            echo "sync_milestones=$SYNC_MILESTONES"
            echo "copilot_pr_author=$COPILOT_PR_AUTHOR"
            echo "project_status_field=$PROJECT_STATUS_FIELD"
            echo "template_profile=$TEMPLATE_PROFILE"
            echo "trigger_label=$TRIGGER_LABEL"
            echo "create_first_issue=$CREATE_FIRST_ISSUE"
            echo "status_todo=$STATUS_TODO"
            echo "status_wip=$STATUS_WIP"
            echo "status_review=$STATUS_REVIEW"
            echo "status_done=$STATUS_DONE"
            echo "wip_label=$WIP_LABEL"
            echo "review_label=$REVIEW_LABEL"
            echo "copilot_bot_login=$COPILOT_BOT_LOGIN"
            echo "human_reviewers=$HUMAN_REVIEWERS"
            echo "wip_timeout_hours=$WIP_TIMEOUT_HOURS"
            echo "template_vars=$TEMPLATE_VARS"
            echo "workspaces=$WORKSPACES"
          } >> $GITHUB_OUTPUT

          echo "### Resolved values" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| org_login | $ORG_LOGIN |" >> $GITHUB_STEP_SUMMARY
          echo "| project_number | $PROJECT_NUMBER |" >> $GITHUB_STEP_SUMMARY
          echo "| template_profile | $TEMPLATE_PROFILE |" >> $GITHUB_STEP_SUMMARY
          echo "| trigger_label | $TRIGGER_LABEL |" >> $GITHUB_STEP_SUMMARY
          echo "| sync_labels | $SYNC_LABELS |" >> $GITHUB_STEP_SUMMARY
          echo "| sync_milestones | $SYNC_MILESTONES |" >> $GITHUB_STEP_SUMMARY
          echo "| create_first_issue | $CREATE_FIRST_ISSUE |" >> $GITHUB_STEP_SUMMARY
          echo "| copilot_pr_author | $COPILOT_PR_AUTHOR |" >> $GITHUB_STEP_SUMMARY
          echo "| status_todo | $STATUS_TODO |" >> $GITHUB_STEP_SUMMARY
          echo "| status_wip | $STATUS_WIP |" >> $GITHUB_STEP_SUMMARY
          echo "| status_review | $STATUS_REVIEW |" >> $GITHUB_STEP_SUMMARY
          echo "| status_done | $STATUS_DONE |" >> $GITHUB_STEP_SUMMARY

      - name: Sync labels
        if: steps.resolve.outputs.sync_labels == 'true'
        uses: ./.github/actions/sync-labels
        with:
          labels-file: .github/templates/${{ steps.resolve.outputs.template_profile }}/templates-mapping.json
          repository: ${{ github.repository }}

      - name: Sync milestones
        id: sync-milestones
        if: steps.resolve.outputs.sync_milestones == 'true'
        uses: ./.github/actions/sync-milestones
        with:
          milestones-file: .github/templates/${{ steps.resolve.outputs.template_profile }}/templates-mapping.json
          repository: ${{ github.repository }}

      - name: Resolve first phase from templates-mapping.json
        if: steps.resolve.outputs.create_first_issue == 'true'
        id: first_phase
        run: |
          MAPPING_FILE=".github/templates/${{ steps.resolve.outputs.template_profile }}/templates-mapping.json"
          TEMPLATE_COUNT=$(jq '.templates | length' "$MAPPING_FILE")
          if [ "$TEMPLATE_COUNT" -eq 0 ]; then
            echo "::error::Templates array is empty in templates-mapping.json. At least one template is required."
            exit 1
          fi
          FIRST_TITLE=$(jq -r '.templates[0].title' "$MAPPING_FILE")
          FIRST_FILE=$(jq -r '.templates[0].file' "$MAPPING_FILE")
          FIRST_LABEL=$(jq -r '.templates[0].label' "$MAPPING_FILE")
          FIRST_MILESTONE=$(jq -r '.templates[0].milestone // empty' "$MAPPING_FILE")
          echo "title=$FIRST_TITLE" >> $GITHUB_OUTPUT
          echo "file=$FIRST_FILE" >> $GITHUB_OUTPUT
          echo "label=$FIRST_LABEL" >> $GITHUB_OUTPUT
          echo "milestone=$FIRST_MILESTONE" >> $GITHUB_OUTPUT

      - name: Check existing first phase issue
        if: steps.resolve.outputs.create_first_issue == 'true'
        id: check_existing_issue
        run: |
          LABEL="${{ steps.first_phase.outputs.label }}"
          ISSUE_NUMBER=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state all \
            --label "$LABEL" \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "Issue with label '$LABEL' already exists (#$ISSUE_NUMBER), skipping creation"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create first phase issue
        if: steps.resolve.outputs.create_first_issue == 'true' && steps.check_existing_issue.outputs.exists != 'true'
        uses: ./.github/actions/create-phase-issue
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          title: ${{ steps.first_phase.outputs.title }}
          body_path: .github/templates/${{ steps.resolve.outputs.template_profile }}/${{ steps.first_phase.outputs.file }}
          labels: '${{ steps.resolve.outputs.trigger_label }},${{ steps.first_phase.outputs.label }},${{ steps.resolve.outputs.wip_label }}'
          assign_copilot: 'true'
          copilot_login: ${{ steps.resolve.outputs.copilot_bot_login }}
          org_login: ${{ steps.resolve.outputs.org_login }}
          project_number: ${{ steps.resolve.outputs.project_number }}
          project_url: ${{ steps.resolve.outputs.project_url }}
          milestone_number: ${{ steps.resolve.outputs.sync_milestones == 'true' && fromJSON(steps.sync-milestones.outputs.milestone_map)[steps.first_phase.outputs.milestone] || '' }}

      - name: Summary
        run: |
          echo "## Agent Squad Bootstrapped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Org**: ${{ steps.resolve.outputs.org_login }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: #${{ steps.resolve.outputs.project_number }} — ${{ steps.resolve.outputs.project_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Labels synced**: ${{ steps.resolve.outputs.sync_labels }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Milestones synced**: ${{ steps.resolve.outputs.sync_milestones }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger label**: ${{ steps.resolve.outputs.trigger_label }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Template profile**: ${{ steps.resolve.outputs.template_profile }}" >> $GITHUB_STEP_SUMMARY
          echo "- **First phase created**: ${{ steps.resolve.outputs.create_first_issue }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Edit \`.github/copilot-instructions.md\` with your project conventions" >> $GITHUB_STEP_SUMMARY
          echo "2. Review \`.github/squad-config.json\` values" >> $GITHUB_STEP_SUMMARY
          echo "3. Agent squad workflows are now active" >> $GITHUB_STEP_SUMMARY
