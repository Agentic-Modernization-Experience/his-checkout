name: 'On Copilot PR: Transition to Review'

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: on-copilot-pr-transition-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-and-transition:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/squad-config.json
            .github/actions/load-squad-config
            .github/actions/update-project-status

      - name: Load squad config
        id: config
        uses: ./.github/actions/load-squad-config

      - name: Check if PR author is Copilot
        id: check-author
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          COPILOT_PR_AUTHOR="${{ steps.config.outputs.copilot_pr_author }}"
          COPILOT_BOT_LOGIN="${{ steps.config.outputs.copilot_bot_login }}"
          if [[ "$PR_AUTHOR" == "$COPILOT_PR_AUTHOR" || "$PR_AUTHOR" == "$COPILOT_BOT_LOGIN" ]]; then
            echo "is_copilot=true" >> $GITHUB_OUTPUT
            echo "PR author ($PR_AUTHOR) matches Copilot config"
          else
            echo "is_copilot=false" >> $GITHUB_OUTPUT
            echo "PR author ($PR_AUTHOR) is not Copilot — skipping"
          fi

      - name: Find linked issue
        id: find-issue
        if: steps.check-author.outputs.is_copilot == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const prBody = context.payload.pull_request.body || '';
            const prBranch = context.payload.pull_request.head.ref;

            console.log(`Checking PR #${prNumber} for linked issues...`);

            // Strategy 1: Parse "Closes #N" / "Fixes #N" from PR body
            const closesPattern = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            let match;
            while ((match = closesPattern.exec(prBody)) !== null) {
              const issueNumber = parseInt(match[1], 10);
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const hasWip = issue.data.labels.some(l => l.name === '${{ steps.config.outputs.wip_label }}');
              if (hasWip) {
                console.log(`Found WIP issue #${issueNumber} via PR body`);
                core.setOutput('issue_number', issueNumber);
                core.setOutput('issue_id', issue.data.node_id);
                core.setOutput('found', 'true');
                return;
              }
            }

            // Strategy 2: Check timeline cross-references on open WIP issues
            const { data: wipIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: '${{ steps.config.outputs.wip_label }}',
              state: 'open',
              per_page: 50
            });

            for (const issue of wipIssues) {
              const timeline = await github.rest.issues.listEventsForTimeline({
                owner, repo,
                issue_number: issue.number,
                per_page: 100
              });

              for (const event of timeline.data) {
                if (event.event === 'cross-referenced' &&
                    event.source?.issue?.pull_request &&
                    event.source?.issue?.number === prNumber) {
                  console.log(`Found WIP issue #${issue.number} via cross-reference`);
                  core.setOutput('issue_number', issue.number);
                  core.setOutput('issue_id', issue.node_id);
                  core.setOutput('found', 'true');
                  return;
                }
              }
            }

            console.log('No linked WIP issue found for this PR');
            core.setOutput('found', 'false');

      - name: Check workflow status on PR branch
        id: check-workflow
        if: steps.find-issue.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.pull_request.head.ref;

            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo,
              branch,
              per_page: 20
            });

            const copilotRuns = runs.data.workflow_runs.filter(run =>
              (run.name && run.name.toLowerCase().includes('copilot')) ||
              (run.path && run.path.includes('copilot'))
            );

            if (copilotRuns.length > 0) {
              const latest = copilotRuns[0];
              console.log(`Latest Copilot workflow: ${latest.status} (${latest.conclusion})`);
              if (latest.status === 'completed' && latest.conclusion === 'success') {
                core.setOutput('completed', 'true');
                return;
              }
            }

            console.log('Copilot workflow not yet completed');
            core.setOutput('completed', 'false');

      - name: Check idempotency
        id: check-label
        if: steps.check-workflow.outputs.completed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = Number('${{ steps.find-issue.outputs.issue_number }}');
            const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const hasReview = issue.data.labels.some(l => l.name === '${{ steps.config.outputs.review_label }}');
            core.setOutput('has_review_label', hasReview.toString());
            if (hasReview) console.log('Issue already in Review state');

      - name: Update Project Status to Review
        if: |
          steps.check-workflow.outputs.completed == 'true' &&
          steps.check-label.outputs.has_review_label != 'true'
        uses: ./.github/actions/update-project-status
        with:
          issue_id: ${{ steps.find-issue.outputs.issue_id }}
          project_number: ${{ steps.config.outputs.project_number }}
          org_login: ${{ steps.config.outputs.org_login }}
          status: ${{ steps.config.outputs.status_review }}
          status_field: ${{ steps.config.outputs.project_status_field }}

      - name: Swap labels WIP → Review
        if: |
          steps.check-workflow.outputs.completed == 'true' &&
          steps.check-label.outputs.has_review_label != 'true'
        uses: actions/github-script@v7
        env:
          WIP_LABEL: ${{ steps.config.outputs.wip_label }}
          REVIEW_LABEL: ${{ steps.config.outputs.review_label }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = Number('${{ steps.find-issue.outputs.issue_number }}');
            const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const labels = issue.data.labels.map(l => l.name).filter(n => n !== process.env.WIP_LABEL);
            if (!labels.includes(process.env.REVIEW_LABEL)) labels.push(process.env.REVIEW_LABEL);
            await github.rest.issues.setLabels({ owner, repo, issue_number: issueNumber, labels });
            console.log(`Labels updated: ${labels.join(', ')}`);

      - name: Request review on PR
        if: |
          steps.check-workflow.outputs.completed == 'true' &&
          steps.check-label.outputs.has_review_label != 'true'
        uses: actions/github-script@v7
        env:
          HUMAN_REVIEWERS: ${{ steps.config.outputs.human_reviewers }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewers = JSON.parse(process.env.HUMAN_REVIEWERS || '[]');
            if (reviewers.length > 0) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner, repo,
                  pull_number: prNumber,
                  reviewers
                });
                console.log(`Requested review from ${reviewers.join(', ')}`);
              } catch (error) {
                console.log(`Could not request review: ${error.message}`);
              }
            } else {
              console.log('No human_reviewers configured in squad-config.json');
            }

      - name: Comment on issue
        if: |
          steps.check-workflow.outputs.completed == 'true' &&
          steps.check-label.outputs.has_review_label != 'true'
        uses: actions/github-script@v7
        env:
          WIP_LABEL: ${{ steps.config.outputs.wip_label }}
          REVIEW_LABEL: ${{ steps.config.outputs.review_label }}
          PROJECT_URL: ${{ steps.config.outputs.project_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = Number('${{ steps.find-issue.outputs.issue_number }}');
            const prNumber = context.payload.pull_request.number;
            const prUrl = `https://github.com/${owner}/${repo}/pull/${prNumber}`;
            const labelsUpdated = `Labels updated: ${process.env.WIP_LABEL} → ${process.env.REVIEW_LABEL}`;

            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: `**Copilot finished!**\n\n**Pull Request**: #${prNumber}\n**Review**: ${prUrl}\n\nProject status updated to "Review"\n${labelsUpdated}\n\n[View in Project](${process.env.PROJECT_URL})`
            });
